name: release

# Cut a release by pushing a version tag:
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# This builds the single static binary for every supported platform,
# packages each the same way as v0.1.0 (route42_<version>_<os>_<arch>),
# writes SHA256SUMS, and publishes a GitHub release with the assets.
# The web console is compiled into every binary via go:embed — there is
# nothing extra to ship.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Build & package
        run: |
          set -euo pipefail
          REF="${GITHUB_REF_NAME}"          # e.g. v0.2.0
          VERSION="${REF#v}"                # e.g. 0.2.0
          mkdir -p build dist
          platforms=(
            "linux amd64 tar.gz"
            "linux arm64 tar.gz"
            "darwin amd64 tar.gz"
            "darwin arm64 tar.gz"
            "windows amd64 zip"
          )
          for p in "${platforms[@]}"; do
            set -- $p; os=$1; arch=$2; fmt=$3
            bin="route42"; [ "$os" = "windows" ] && bin="route42.exe"
            echo "==> $os/$arch"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
              -trimpath -ldflags "-s -w -X main.version=${REF}" \
              -o "build/$bin" ./cmd/route42
            name="route42_${VERSION}_${os}_${arch}"
            if [ "$fmt" = "zip" ]; then
              (cd build && zip -q "../dist/${name}.zip" "$bin")
            else
              tar -C build -czf "dist/${name}.tar.gz" "$bin"
            fi
            rm -f "build/$bin"
          done
          (cd dist && sha256sum * > SHA256SUMS)
          ls -la dist

      - name: Publish release
        # Uses the gh CLI that ships with GitHub-hosted runners — no
        # third-party action, authenticated by the built-in GITHUB_TOKEN.
        # Idempotent: if the tag already has a release (e.g. it was created
        # from the GitHub UI, which makes the tag AND the release before this
        # workflow runs), update that release and (re)upload the assets
        # instead of failing. Otherwise create the release from scratch.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes="docs/releases/${GITHUB_REF_NAME}.md"
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "release ${GITHUB_REF_NAME} already exists — updating notes and uploading assets"
            gh release edit "${GITHUB_REF_NAME}" --title "Route42 CE ${GITHUB_REF_NAME}" \
              $([ -f "$notes" ] && echo --notes-file "$notes")
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            echo "creating release ${GITHUB_REF_NAME}"
            args=(--verify-tag --title "Route42 CE ${GITHUB_REF_NAME}")
            if [ -f "$notes" ]; then
              args+=(--notes-file "$notes")
            else
              args+=(--generate-notes)
            fi
            gh release create "${GITHUB_REF_NAME}" dist/* "${args[@]}"
          fi
